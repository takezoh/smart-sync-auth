<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
  <title>Smart Sync - OAuth Redirect</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 20px;
      color: #333;
      text-align: center;
    }
    h1 { font-size: 1.4rem; }
    .message { margin: 24px 0; line-height: 1.6; }
    .error { color: #c0392b; }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: #7c3aed;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
    }
    a:hover { background: #6d28d9; }
    .fallback { margin-top: 32px; font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  <h1>Smart Sync for Obsidian</h1>
  <div id="content"></div>

  <script>
    (function () {
      var ALLOWED_APPS = {
        "obsidian-plugin": {
          redirectBase: "obsidian://air-sync-auth",
          displayName: "Obsidian"
        }
      };

      var params = new URLSearchParams(window.location.search);
      var code = params.get("code");
      var stateRaw = params.get("state");
      var content = document.getElementById("content");

      function showError(msg) {
        content.innerHTML = '<p class="message error">' + msg + "</p>";
      }

      if (!code || !stateRaw) {
        showError("Missing authentication parameters.<br>Please try signing in again from Obsidian.");
        return;
      }

      var state;
      try {
        state = JSON.parse(atob(stateRaw));
      } catch (e) {
        showError("Invalid state parameter.");
        return;
      }

      var appConfig = ALLOWED_APPS[state.app];
      if (!appConfig) {
        showError("Unknown app.");
        return;
      }

      var redirectUri =
        appConfig.redirectBase +
        "?code=" + encodeURIComponent(code) +
        "&state=" + encodeURIComponent(stateRaw);

      content.innerHTML =
        '<p class="message">Redirecting to ' + appConfig.displayName + '…</p>' +
        '<div class="fallback">' +
        "<p>If it doesn't open automatically, click the button below.</p>" +
        '<a href="' + redirectUri + '">Open ' + appConfig.displayName + "</a>" +
        "</div>";

      window.location.href = redirectUri;
    })();
  </script>
</body>
</html>
